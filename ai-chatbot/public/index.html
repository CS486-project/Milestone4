<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chatbot Homepage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
</head>
<body id="home">
    <h1>AI Chatbot</h1>
    <p>Welcome! This chatbot uses OpenAI to answer your questions and remembers your conversation history across sessions.</p>
    <form id="participant-form">
        <label for="participantID">Enter your Participant ID:</label>
        <input type="text" id="participantID" name="participantID" required>
        <button type="submit">Start Chat</button>
    </form>

    <script>
        document.getElementById('participant-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const participantID = document.getElementById('participantID').value;

            // Save the Participant ID in localStorage
            localStorage.setItem('participantID', participantID);

            // Determine which system the participant should see
            const systemID = parseInt(participantID) % 2 === 1 ? 1 : 2;

            // Redirect to now updated study-workflow html page with participantID and systemID in the URL
            window.location.href = `/study-workflow.html?participantID=${participantID}&systemID=${systemID}`;
        });
    </script>
</body>
</html>
